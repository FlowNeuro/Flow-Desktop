name: Release desktop applications

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      notes: ${{ steps.changelog.outputs.notes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve release channel
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"

          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "$tag" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Resolve changelog notes
        id: changelog
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"

          # Prefer the changelog that matches the released tag; otherwise fall
          # back to the newest changelog file by semantic version.
          file="changelog/${tag}.txt"
          if [[ ! -f "$file" ]]; then
            file="$(ls -1 changelog/v*.txt 2>/dev/null | sort -V | tail -n1 || true)"
          fi

          if [[ -n "$file" && -f "$file" ]]; then
            echo "Using changelog file: $file"
          else
            echo "No changelog file found; using a generic release note."
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            if [[ -n "$file" && -f "$file" ]]; then
              cat "$file"
            else
              echo "Download the installer for your operating system and architecture below."
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.name }}
    needs: prepare
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            slug: windows-x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - name: Windows ARM64
            slug: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis
          - name: Linux x64
            slug: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb,rpm
          - name: Linux ARM64
            slug: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu --bundles appimage,deb,rpm
          - name: macOS Intel
            slug: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - name: macOS Apple Silicon
            slug: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            gstreamer1.0-alsa \
            gstreamer1.0-gl \
            gstreamer1.0-libav \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        run: pnpm verify:version

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'Flow Beta v__VERSION__' || 'Flow v__VERSION__' }}
          releaseBody: ${{ needs.prepare.outputs.notes }}
          releaseDraft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generateReleaseNotes: false
          uploadUpdaterJson: true
          releaseAssetNamePattern: Flow_[version]_[platform]_[arch][setup][ext]
          retryAttempts: 2
          args: >-
            ${{ matrix.args }}
            ${{ needs.prepare.outputs.is_prerelease == 'true' && '--config src-tauri/tauri.prerelease.conf.json' || '' }}

      - name: Verify AppImage bundles GStreamer codecs
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(ls src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage | head -n1)"
          chmod +x "$appimage"
          "$appimage" --appimage-extract > /dev/null
          for plugin in libgstlibav.so libgstplayback.so libgstvpx.so; do
            if ! find squashfs-root -name "$plugin" -print -quit | grep -q .; then
              echo "::error::$plugin missing from the AppImage — GStreamer bundling is broken." >&2
              exit 1
            fi
          done
          rm -rf squashfs-root

      - name: Report package sizes
        run: node scripts/report-bundle-sizes.mjs src-tauri/target/${{ matrix.target }}/release/bundle

      - name: Upload tagged Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Flow-${{ needs.prepare.outputs.version }}-${{ matrix.slug }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload tagged macOS disk image
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: Flow-${{ needs.prepare.outputs.version }}-${{ matrix.slug }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload tagged Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: Flow-${{ needs.prepare.outputs.version }}-${{ matrix.slug }}-appimage
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Upload tagged Linux Debian package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: Flow-${{ needs.prepare.outputs.version }}-${{ matrix.slug }}-deb
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Upload tagged Linux RPM package
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: Flow-${{ needs.prepare.outputs.version }}-${{ matrix.slug }}-rpm
          path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 30
