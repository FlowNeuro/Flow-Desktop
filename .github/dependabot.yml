version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Beirut
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 10
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Asia/Beirut
    open-pull-requests-limit: 10
    groups:
      compatible-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Asia/Beirut
    open-pull-requests-limit: 10
    groups:
      action-updates:
        patterns:
          - "*"
