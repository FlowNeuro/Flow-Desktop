name: Bug report
description: Report a reproducible problem in Flow Desktop.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Flow. Please include enough detail for someone else to reproduce the problem. Remove tokens, cookies, account data, and other secrets from logs before submitting them.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing open and closed issues for this problem.
          required: true
        - label: I can reproduce this on the latest available Flow release or a current development build.
          required: true
        - label: I removed private account data, authentication tokens, cookies, and personal information.
          required: true

  - type: input
    id: app-version
    attributes:
      label: Flow version
      description: Use the release version or commit SHA. Do not write only "latest."
      placeholder: "0.1.0 or 1a2b3c4"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Ubuntu
        - Debian
        - Fedora or another RPM-based distribution
        - Other Linux distribution
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      description: Include the exact release or build number and desktop environment on Linux.
      placeholder: "Windows 11 24H2 build 26100; macOS 15.5; Ubuntu 24.04 GNOME"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: CPU architecture
      options:
        - x64 / x86_64
        - ARM64 / aarch64
        - Other
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Installation package
      options:
        - Windows NSIS installer
        - macOS DMG
        - Linux AppImage
        - Linux deb
        - Linux rpm
        - Development build from source
        - Other
    validations:
      required: true

  - type: input
    id: webview
    attributes:
      label: WebView/runtime version
      description: On Windows, include the Microsoft Edge WebView2 version. On Linux, include the WebKitGTK version if known.
      placeholder: "WebView2 149.0.4022.80 or WebKitGTK 2.x"

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Startup or installation
        - Video playback or streaming
        - Music playback
        - Shorts
        - Search or browsing
        - Subscriptions or playlists
        - Recommendations
        - Import, export, or local database
        - Window or desktop integration
        - Performance or resource usage
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Start from a fresh app launch and include the smallest reliable sequence.
      placeholder: |
        1. Launch Flow.
        2. Open ...
        3. Select ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include how often it happens and whether restarting changes the result.
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Relevant media or URL
      description: If playback-specific, include a public video, playlist, channel, or music URL that reproduces the issue. Do not share private links.

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the smallest relevant log section. Redact secrets and personal data.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, recordings, network conditions, proxy/VPN details, or regression information when relevant.
