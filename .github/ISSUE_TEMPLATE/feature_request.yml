name: Feature request
description: Propose a focused improvement to Flow Desktop.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this request.
          required: true
        - label: This request is specifically relevant to Flow Desktop.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem or limitation, not only the proposed control or implementation.
      placeholder: "When I ..., I cannot ..., which means ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the workflow from the user's perspective.
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: Relevant platforms
      multiple: true
      options:
        - All desktop platforms
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention current workarounds or simpler approaches you considered.

  - type: textarea
    id: privacy
    attributes:
      label: Privacy, security, and data impact
      description: State whether this needs new permissions, network services, account data, local storage, or telemetry. Write "None" if it has no impact.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, related standards, or links that clarify the request.
